<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린대학교 종합정보시스템</title>
    <meta name="theme-color" content="#3e9e7e" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta property="og:image" content="/thum.png" />
    <meta property="og:site_name" content="그린대학교" />
    <meta property="og:description" content="너와 나의 꿈을 그린 그린 대학교" />
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script> <!-- 카카오 주소 검색 API -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <!-- [추가] 개발 환경에서 이전에 등록된 PWA 서비스 워커를 강제 해제 → ngrok 테스트 시 SW 캐시로 인한 빈 화면 방지 -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
      }
    </script>
  </body>
</html>
