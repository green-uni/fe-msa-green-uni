<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/icons/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린대학교 종합정보시스템</title>
    <meta name="theme-color" content="#3e9e7e" />

    <!-- [추가] iOS PWA 필수 메타태그 -->
    <!-- apple-mobile-web-app-capable: iOS에서 홈화면 추가 후 URL 바 숨김(standalone 모드) 활성화 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- status-bar-style: 상태바를 반투명 검정으로 → 앱 배경색이 상태바 뒤까지 채워짐 -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- 홈화면 아이콘 아래 표시될 앱 이름 -->
    <meta name="apple-mobile-web-app-title" content="그린대학출결시스템" />
    <!-- [수정] 경로 수정: /apple-touch-icon.png → /icons/apple-touch-icon.png -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <meta property="og:image" content="/thum.png" />
    <meta property="og:site_name" content="그린대학교" />
    <meta property="og:description" content="너와 나의 꿈을 그린 그린 대학교" />
    <!-- [수정] defer 추가 — 동기 로딩 시 모바일에서 최대 30초간 렌더링 차단 문제 수정 -->
    <script defer src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <!-- [삭제] SW 강제 해제 스크립트 제거 — PWA 서비스 워커 설치를 막고 있었음 -->
    <!-- vite-plugin-pwa의 autoUpdate가 SW 갱신을 자동 처리하므로 강제 해제 불필요 -->
    <!-- 개발 중 캐시 문제 발생 시 브라우저에서 Ctrl+Shift+R(강력 새로고침) 사용 -->
  </body>
</html>
